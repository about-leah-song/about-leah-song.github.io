<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    
    <style>
      /* Dropdown Menu CSS */
      .top-nav { position: absolute; top: 25px; right: 40px; z-index: 100; font-family: "Open Sans", sans-serif; }
      .top-nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 25px; }
      .top-nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-weight: bold; font-size: 1.1em; transition: color 0.2s; }
      .top-nav a:hover { color: #ffffff; }
      
      /* We add padding-bottom here to create a safe, invisible bridge for your mouse */
      .dropdown { position: relative; padding-bottom: 20px; }
      
      .dropdown-menu { 
        display: none; position: absolute; right: 0; 
        top: 100%; /* Sits exactly flush with the bottom of the invisible bridge */ 
        background: white; border-radius: 6px; min-width: 180px; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.15); overflow: hidden; 
      }
      .dropdown-menu a { color: #155799; padding: 12px 20px; display: block; font-size: 1em; border-bottom: 1px solid #f0f0f0; }
      .dropdown-menu a:hover { background: #f4f8fa; color: #155799; }
      .dropdown:hover .dropdown-menu { display: block; }
      /* Target the main page header */
      .page-header {
        /*
          The "safety overlay": We add a subtle dark gradient ON TOP 
          of the image. It starts lighter and fades darker at the bottom, making 
          the white text pop against ANY image (schematics, circuit boards, etc.)
        */
        
        /* Ensures the image fills the entire area without stretching ugly */
        background-size: cover;
        
            /* Centers the most important part of the image */
            background-position: center;
        
        /* Ensures the gradient overlay is applied and repeated properly */
        background-repeat: no-repeat;
        
        /* Add a direct shadow to the main title text to be extra safe */
        text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      }
      
      /* Tweak the tagline slightly so it looks better against a photo */
      .project-tagline {
        font-size: 1.25rem;
        opacity: 0.95;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }
    </style>
  </head>
  
  <body>
    <!-- Your Custom Navigation -->
    <nav class="top-nav">
      <ul>
        <li><a href="/">Home</a></li>
        <li class="dropdown">
          <a href="#" style="cursor: default;">Portfolio ▾</a>
          <div class="dropdown-menu">
            <a href="/projects.html">Technical Projects</a>
            <a href="/experience.html">Professional Experience</a>
          </div>
        </li>
      </ul>
    </nav>

    <!-- The Standard Cayman Header & Content -->
    <!-- This checks if the page has a custom image; if not, it uses your default campus one -->
    <header class="page-header" role="banner" style="background-image: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%), url('{% if page.header_image %}{{ page.header_image }}{% else %}/assets/images/header2.jpg{% endif %}');">
      
      <!-- This uses the page title if it exists; otherwise, it defaults to "Leah Song's Portfolio" -->
      <h1 class="project-name">{{ page.title | default: site.title }}</h1>
      
      <!-- This uses a page description if you provide one; otherwise, it leaves it blank or uses the site default -->
      <h2 class="project-tagline">{{ page.description | default: site.description }}</h2>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>
  </body>
</html>
