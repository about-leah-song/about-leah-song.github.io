media:
  input: assets/images
  output: /assets/images

content:
  - name: projects
    label: Technical Projects
    type: collection
    path: _projects
    fields:
      - name: title
        label: Project Title
        type: string
        required: true
      - name: order
        label: Display Order (1 is top)
        type: number
      - name: description
        label: Short Description
        type: string
        required: true
      - name: tools
        label: Tech Stack / Tools Used
        type: string
      - name: header
        label: Header Options
        type: object
        fields:
          - name: overlay_image
            label: Cover Image / Schematic
            type: image
      - name: body
        label: Project Details
        type: rich-text

  - name: experience
    label: Professional Experience
    type: collection
    path: _experience
    fields:
      - name: title
        label: Company / Organization
        type: string
        required: true
      - name: order
        label: Display Order (1 is top)
        type: number
      - name: logo
        label: Company Logo
        type: image
      - name: role
        label: Role / Title
        type: string
        required: true
      - name: dates
        label: Date Range
        type: string
      - name: body
        label: Responsibilities & Achievements
        type: rich-text
        
  - name: home
    label: Home Page
    type: file
    path: index.md
    fields:
      - name: body
        label: Page Content
        type: rich-text
